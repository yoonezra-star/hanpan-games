<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>전체 게임 - 한판게임즈</title>
    <meta name="description" content="한판게임즈의 무료 웹 미니게임 목록입니다. 30개 이상의 아케이드, 퍼즐, 보드, 두뇌, 스킬 게임을 카테고리별로 확인하세요.">
    <link rel="canonical" href="https://hanpan-games.pages.dev/games/">
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="한판게임즈 홈">
        <span class="brand-mark" aria-hidden="true">H</span>
        <span><strong>한판게임즈</strong><small>HANPAN GAMES</small></span>
      </a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="/games/" aria-current="page">게임</a>
        <a href="/guides/">가이드</a>
        <a href="/about/">소개</a>
        <a href="/help/">도움말</a>
        <a href="/contact/">문의</a>
      </nav>
    </header>

    <main class="subpage">
      <section class="page-title">
        <p class="eyebrow">Game library</p>
        <h1>전체 게임</h1>
        <p>
          한판게임즈의 게임은 짧은 플레이 시간, 쉬운 규칙, 모바일 대응, 반복 도전의 재미를 기준으로 정리합니다.
          검색과 필터로 오늘 하고 싶은 한 판을 골라 보세요.
        </p>
      </section>

      <section class="filter-panel" aria-label="게임 필터">
        <div class="game-meta"><strong id="arcadeCount">34개 게임</strong><span>설치 없이 바로 실행</span></div>
        <input id="arcadeSearch" type="search" placeholder="게임 이름이나 설명 검색" aria-label="게임 검색">
        <div class="filter-buttons" role="list">
          <button type="button" class="filter active" data-arcade-filter="all">전체</button>
          <button type="button" class="filter" data-arcade-filter="arcade">아케이드</button>
          <button type="button" class="filter" data-arcade-filter="puzzle">퍼즐</button>
          <button type="button" class="filter" data-arcade-filter="board">보드·전략</button>
          <button type="button" class="filter" data-arcade-filter="brain">두뇌·기억</button>
          <button type="button" class="filter" data-arcade-filter="skill">스킬</button>
          <button type="button" class="filter" data-arcade-filter="test">테스트</button>
        </div>
      </section>

      <section class="game-list" data-arcade-list aria-label="전체 게임 목록"></section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>한판게임즈</strong>
        <p>설치 없이 바로 즐기는 무료 웹 미니게임.</p>
      </div>
      <nav aria-label="푸터 메뉴">
        <a href="/about/">소개</a>
        <a href="/help/">도움말</a>
        <a href="/updates/">업데이트</a>
        <a href="/privacy/">개인정보처리방침</a>
        <a href="/terms/">이용약관</a>
        <a href="/contact/">문의</a>
      </nav>
      <p class="copyright">© <span id="year"></span> Hanpan Games. All rights reserved.</p>
    </footer>

    <script src="/assets/app.js" defer></script>
    <script src="/assets/arcade.js" defer></script>
  </body>
</html>
